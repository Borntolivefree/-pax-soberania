<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pax-Index</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0b0b0b; --gold: #f1c40f; --green: #2ecc71; --grey: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .wallet { width: 100%; max-width: 400px; background: var(--grey); padding: 20px; border-radius: 15px; border: 1px solid var(--gold); display: flex; justify-content: space-between; margin-bottom: 20px; box-sizing: border-box; }
        #balance { color: var(--gold); font-size: 1.2rem; }
        #reader { width: 100%; max-width: 400px; border-radius: 15px; overflow: hidden; margin-bottom: 20px; }
        .btn { width: 100%; max-width: 400px; padding: 18px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin: 5px 0; display: block; text-align: center; text-decoration: none; }
        .btn-gold { background: var(--gold); color: black; }
        #res { display: none; width: 100%; max-width: 400px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="wallet">
        <span>PAX WALLET</span>
        <b id="balance">0.00€</b>
    </div>

    <div id="reader"></div>

    <button class="btn btn-gold" onclick="run_scan()">START SCANNER</button>
    
    <label class="btn" style="background: #222; color: #fff;">
        📷 UPLOAD RECEIPT
        <input type="file" accept="image/*" style="display: none;" onchange="run_ocr(this)">
    </label>

    <div id="res">
        <button class="btn btn-gold" onclick="save_data()">CLAIM 0.50€ CASHBACK</button>
    </div>

    <script translate="no">
        // Database Config
        const DB_URL = 'https://gxjcsauhdvdnpagezvbe.supabase.co';
        const DB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd4amNzdWhkdmRucGFnZXp2YmUiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTczOTY1NTYyMSwiZXhwIjoyMDU1MjMxNjIxfQ.08E_p2yK4Y_I6G2fWw-B6G2M2Z2Z2Z2Z2Z2Z2Z2Z2Z2'; 
        const _client = supabase.createClient(DB_URL, DB_KEY);

        // Load Balance on startup
        window.onload = async () => {
            const { data } = await _client.from('Histórico').select('valor');
            if (data) {
                let total = data.reduce((acc, item) => acc + parseFloat(item.valor), 0);
                document.getElementById('balance').innerText = total.toFixed(2) + "€";
            }
        };

        // QR Scanner Logic
        function run_scan() {
            const scanner = new Html5Qrcode("reader");
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
                (txt) => { 
                    document.getElementById('res').style.display = "block"; 
                    scanner.stop(); 
                }
            ).catch(err => alert("Error: Use HTTPS and allow camera access."));
        }

        // Image OCR Logic
        async function run_ocr(input) {
            if (!input.files[0]) return;
            alert("Processing image...");
            document.getElementById('res').style.display = "block";
        }

        // Save Transaction
        async function save_data() {
            const { error } = await _client.from('Histórico').insert([{ nif: 'Consumer', valor: 0.50 }]);
            if (error) {
                alert("Database Error: " + error.message);
            } else {
                alert("Success! 0.50€ added.");
                location.reload();
            }
        }
    </script>
</body>
</html>
