<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pax-Index</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0b0b0b; --gold: #f1c40f; --grey: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .wallet { width: 100%; max-width: 400px; background: var(--grey); padding: 20px; border-radius: 15px; border: 1px solid var(--gold); display: flex; justify-content: space-between; margin-bottom: 20px; box-sizing: border-box; }
        #balance { color: var(--gold); font-size: 1.2rem; }
        #banana-icon { font-size: 80px; margin: 20px 0; opacity: 0.8; filter: drop-shadow(0 0 10px #f1c40f); }
        #reader { width: 100%; max-width: 400px; border-radius: 15px; overflow: hidden; }
        .btn { width: 100%; max-width: 400px; padding: 18px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin: 10px 0; text-align: center; background: var(--gold); color: black; display: block; text-decoration: none; }
    </style>
</head>
<body>

    <div class="wallet">
        <span>PAX WALLET</span>
        <b id="balance">0.00€</b>
    </div>

    <div id="banana-icon">🍌</div>
    <div id="reader"></div>

    <button class="btn" onclick="run_scan()">START SCANNER</button>
    
    <button class="btn" style="background: #222; color: #fff;" onclick="document.getElementById('file-input').click()">
        📷 UPLOAD PHOTO
    </button>
    <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="show_claim()">

    <div id="res" style="display:none; width: 100%; max-width: 400px;">
        <button class="btn" onclick="save_data()" style="background: #2ecc71;">CLAIM 0.50€ CASHBACK</button>
    </div>

    <script translate="no">
        const DB_URL = 'https://gxjcsauhdvdnpagezvbe.supabase.co';
        const DB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd4amNzdWhkdmRucGFnZXp2YmUiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTczOTY1NTYyMSwiZXhwIjoyMDU1MjMxNjIxfQ.08E_p2yK4Y_I6G2fWw-B6G2M2Z2Z2Z2Z2Z2Z2Z2Z2Z2'; 
        const _client = supabase.createClient(DB_URL, DB_KEY);

        async function update_balance() {
            const { data, error } = await _client.from('Histórico').select('valor');
            if (data) {
                let total = data.reduce((acc, item) => acc + parseFloat(item.valor || 0), 0);
                document.getElementById('balance').innerText = total.toFixed(2) + "€";
            }
        }

        window.onload = update_balance;

        function run_scan() {
            const scanner = new Html5Qrcode("reader");
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
                (txt) => { 
                    show_claim();
                    scanner.stop(); 
                }
            ).catch(err => alert("Error: Use HTTPS and allow camera."));
        }

        function show_claim() {
            document.getElementById('res').style.display = "block";
            document.getElementById('banana-icon').style.display = "none";
        }

        async function save_data() {
            const { error } = await _client.from('Histórico').insert([{ nif: 'Consumer', valor: 0.50 }]);
            if (error) {
                alert("Database Error: " + error.message);
            } else {
                alert("Success! 0.50€ added.");
                document.getElementById('res').style.display = "none";
                document.getElementById('banana-icon').style.display = "block";
                await update_balance(); // Atualiza o saldo sem recarregar a página
            }
        }
    </script>
</body>
</html>
