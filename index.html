<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pax Wallet</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #f1c40f; --bg: #0b0b0b; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; padding: 20px; margin: 0; }
        
        .wallet-card { 
            border: 1px solid var(--gold); 
            padding: 20px; 
            border-radius: 15px; 
            display: flex; 
            justify-content: space-between; 
            max-width: 350px; 
            margin: 20px auto; 
            background: #1a1a1a; 
            box-sizing: border-box;
        }
        
        #balance { color: var(--gold); font-size: 1.5rem; font-weight: bold; }
        
        .banana-display { 
            font-size: 100px; 
            margin: 40px 0; 
            filter: drop-shadow(0 0 10px var(--gold)); 
        }

        .btn-claim { 
            width: 100%; 
            max-width: 350px; 
            padding: 20px; 
            border-radius: 12px; 
            border: none; 
            font-size: 1.1rem;
            font-weight: bold; 
            cursor: pointer; 
            background: var(--gold); 
            color: black;
        }

        .btn-claim:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="wallet-card">
        <span>MY BALANCE</span>
        <span id="balance">0.00€</span>
    </div>

    <div class="banana-display">🍌</div>

    <button class="btn-claim" id="action-btn" onclick="addMoney()">
        CLAIM 0.50€
    </button>

    <script>
        const DB_URL = 'https://gxjcsauhdvdnpagezvbe.supabase.co';
        const DB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd4amNzdWhkdmRucGFnZXp2YmUiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTczOTY1NTYyMSwiZXhwIjoyMDU1MjMxNjIxfQ.08E_p2yK4Y_I6G2fWw-B6G2M2Z2Z2Z2Z2Z2Z2Z2Z2Z2'; 
        const _supabase = supabase.createClient(DB_URL, DB_KEY);

        async function refreshBalance() {
            const { data } = await _supabase.from('Histórico').select('valor');
            if (data) {
                const total = data.reduce((acc, curr) => acc + parseFloat(curr.valor || 0), 0);
                document.getElementById('balance').innerText = total.toFixed(2) + "€";
            }
        }

        async function addMoney() {
            const btn = document.getElementById('action-btn');
            btn.innerText = "SAVING...";
            btn.disabled = true;

            const { error } = await _supabase
                .from('Histórico')
                .insert([{ nif: 'Manual_Claim', valor: 0.50 }]);

            if (error) {
                alert("Error: " + error.message);
                btn.innerText = "CLAIM 0.50€";
                btn.disabled = false;
            } else {
                await refreshBalance();
                btn.innerText = "SUCCESS!";
                setTimeout(() => {
                    btn.innerText = "CLAIM 0.50€";
                    btn.disabled = false;
                }, 2000);
            }
        }

        window.onload = refreshBalance;
    </script>
</body>
</html>
